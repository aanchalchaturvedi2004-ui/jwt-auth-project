
<!DOCTYPE html>
<html>
<head>
<title>JWT Auth Demo</title>
</head>
<body>

<h2>Register</h2>
<input id="ruser" placeholder="username">
<input id="rpass" placeholder="password" type="password">
<button onclick="register()">Register</button>

<h2>Login</h2>
<input id="luser" placeholder="username">
<input id="lpass" placeholder="password" type="password">
<button onclick="login()">Login</button>

<h2>Profile</h2>
<button onclick="profile()">Get Profile</button>

<pre id="output"></pre>

<script>
let token = "";

async function register(){
  const res = await fetch("http://localhost:3000/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:document.getElementById("ruser").value,
      password:document.getElementById("rpass").value
    })
  });
  document.getElementById("output").innerText = await res.text();
}

async function login(){
  const res = await fetch("http://localhost:3000/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:document.getElementById("luser").value,
      password:document.getElementById("lpass").value
    })
  });
  const data = await res.json();
  token = data.token;
  document.getElementById("output").innerText = JSON.stringify(data,null,2);
}

async function profile(){
  const res = await fetch("http://localhost:3000/profile",{
    headers:{ "Authorization":"Bearer " + token }
  });
  document.getElementById("output").innerText = await res.text();
}
</script>

</body>
</html>
